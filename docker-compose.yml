version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: ipl_postgres
    environment:
      POSTGRES_USER: ipl_user
      POSTGRES_PASSWORD: ipl_password
      POSTGRES_DB: ipl_data
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipl_user -d ipl_data"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: ipl_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Airflow will be added here in Phase 6 or as needed

volumes:
  postgres_data:
  redis_data:
