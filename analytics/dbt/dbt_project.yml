name: "ipl_platform"
version: "1.0.0"
config-version: 2

profile: "ipl_profile"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
