ipl_profile:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      user: "{{ env_var('POSTGRES_USER', 'ipl_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'ipl_password') }}"
      port: 5433
      dbname: "{{ env_var('POSTGRES_DB', 'ipl_data') }}"
      schema: ipl
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
